<!DOCTYPE html>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#ffffff;
color:#000000;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
background:#000000;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
border-bottom:1px solid #d4af37;
z-index:1000;
}

header h1{
font-family:'Playfair Display',serif;
font-weight:600;
font-size:18px;
letter-spacing:1px;
color:#d4af37;
}

nav a{
margin-left:18px;
text-decoration:none;
color:#ffffff;
font-size:13px;
letter-spacing:1px;
transition:0.3s;
}

nav a:hover{
color:#d4af37;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:#ffffff;
padding:20px;
}

.hero h2{
font-family:'Playfair Display',serif;
font-size:52px;
font-weight:600;
color:#000000;
margin-bottom:10px;
}

.hero p{
max-width:520px;
color:#333;
font-size:15px;
line-height:1.6;
}

.btn{
margin-top:25px;
padding:12px 28px;
border:1px solid #d4af37;
background:#000000;
color:#d4af37;
font-size:13px;
letter-spacing:1px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#d4af37;
color:#000000;
}

/* SECTIONS */
section{
padding:100px 20px;
max-width:1100px;
margin:auto;
}

.title{
text-align:center;
font-family:'Playfair Display',serif;
font-size:32px;
color:#000000;
margin-bottom:40px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:#ffffff;
border:1px solid #d4af37;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.card-content h3{
font-family:'Playfair Display',serif;
color:#000000;
font-size:18px;
}

/* FILTERS */
.filters{
text-align:center;
margin-bottom:30px;
}

.filters button{
border:none;
background:none;
margin:0 10px;
font-size:12px;
letter-spacing:1px;
cursor:pointer;
color:#333;
}

.filters button:hover{
color:#d4af37;
}

/* FORM */
form{
display:flex;
flex-direction:column;
gap:12px;
max-width:500px;
margin:auto;
}

input,select,textarea{
padding:12px;
border:1px solid #ccc;
background:#fff;
font-size:14px;
}

textarea{
min-height:100px;
resize:none;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:25px;
right:25px;
width:55px;
height:55px;
background:#000000;
color:#d4af37;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:22px;
text-decoration:none;
}
</style>
</head>

<body>

<button onclick="filter('ouro')">Ouro</button>
<button onclick="filter('prata')">Prata</button>
<button onclick="filter('piercing')">Piercing</button>
</div>

<div class="grid">

<div class="card item ouro">
<img src="https://images.unsplash.com/photo-1601121141461-9d6647bca1ed" alt="Joia de ouro">

</div>

<div class="card item piercing">

<div class="card-content"><h3>Tragus Piercing</h3></div>
</div>

<div class="card item piercing">
<img src="https://images.unsplash.com/photo-1621786030486-4c6f9b7f7b4b" alt="Septum piercing">
<div class="card-content"><h3>Septum Piercing</h3></div>
</div>

</div>

<!-- FORM -->

<a class="whatsapp" href="https://wa.me/5544984090875" target="_blank">💬</a>

<script>
function filter(type){
let items=document.querySelectorAll('.item');
items.forEach(el=>{
el.style.display = (type==='all' || el.classList.contains(type)) ? 'block' : 'none';
});
}
</script>

</body>
</html>
